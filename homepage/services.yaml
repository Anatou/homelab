        proxmoxType: {{JELLYFIN_PROXMOX_TYPE}}
    - Jellyseer:
        href: http://{{IP_JELLYSEER}}:5055
        description: Media requesting service for Jellyfin
        icon: https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fcdn.jsdelivr.net%2Fgh%2Fhomarr-labs%2Fdashboard-icons%2Fpng%2Fjellyseerr.png&f=1&nofb=1&ipt=594e314f5d3d990f366eb95490aad8046ea748b66bdc0d2de7c624f997075aa5
