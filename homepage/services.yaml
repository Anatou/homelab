# For configuration options and examples, please see:
# https://gethomepage.dev/configs/services/

- Proxmox Nodes:
    - Proxatou:
        widget:
          type: proxmox
          url: https://{{IP_PROXATOU}}:8006
          username: {{PROXMOX_USER}}
          password: {{PROXMOX_TOKEN}}
          node: proxatou
    - Proxelite:
        widget:
          type: proxmox
          url: https://{{IP_PROXELITE}}:8006
          username: {{PROXMOX_USER}}
          password: {{PROXMOX_TOKEN}}
          node: proxelite

- Media services:
    - Jellyfin:
        href: http://{{IP_JELLYFIN}}:8096/web/#/home
        description: Media server
        icon: https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fazukaar.github.io%2Fcosmos-servapps-official%2Fservapps%2FJellyfin%2Ficon.png&f=1&nofb=1&ipt=499c6721db3f7f47140b3d5f1a3f8e213f7751e714847183c75cab2fbc8ab411
