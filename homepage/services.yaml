        widget:
          type: qbittorrent
          url: http://{{IP_QBITTORRENT}}:8080
          username: {{QBITTORRENT_USER}}
          password: {{QBITTORRENT_PASSWD}}
    - Prowlarr:
        href: http://{{IP_PROWLARR}}:9696/
